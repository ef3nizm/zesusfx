<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZESU AI - YouTube Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --z-purple: #a78bfa;
            --z-bg: #030014;
            --z-card: rgba(15, 12, 41, 0.8);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--z-bg);
            color: #ede9fe;
            margin: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.15) 0%, transparent 40%);
        }

        .glass-card {
            background: var(--z-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 32px;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(167, 139, 250, 0.1);
            transition: all 0.3s ease;
        }

        .input-box:focus {
            border-color: var(--z-purple);
            background: rgba(255, 255, 255, 0.06);
            outline: none;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.1);
        }

        .sidebar-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(167, 139, 250, 0.1);
            transition: all 0.3s ease;
        }

        .sidebar-btn:hover {
            background: var(--z-purple);
            color: #000;
            transform: translateX(5px);
        }

        #star-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .loader {
            position: fixed;
            inset: 0;
            background: var(--z-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div id="global-loader" class="loader">
        <div class="w-12 h-12 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
    </div>

    <canvas id="star-canvas"></canvas>

    <aside class="fixed left-6 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-4">
        <a href="index.html" class="sidebar-btn" title="Ana Sayfa"><i class="fa-solid fa-house"></i></a>
        <a href="midi.html" class="sidebar-btn" title="MIDI Studio"><i class="fa-solid fa-music"></i></a>
        <a href="portfolio.html" class="sidebar-btn" title="Portfolyo"><i class="fa-solid fa-compact-disc"></i></a>
    </aside>

    <main class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass-card max-w-2xl w-full p-8 md:p-12">
            <div class="text-center mb-10">
                <i class="fa-brands fa-youtube text-5xl text-red-500 mb-4"></i>
                <h1 class="text-3xl font-black uppercase tracking-widest mb-2">Media <span class="text-purple-400">Downloader</span></h1>
                <p class="text-sm opacity-40 font-medium tracking-widest">URL girin ve anında indirin</p>
            </div>

            <div class="space-y-6">
                <div class="relative">
                    <input type="text" id="youtube-url" placeholder="YouTube URL'sini buraya yapıştırın..." 
                        class="input-box w-full py-4 px-6 rounded-2xl text-lg font-medium placeholder:opacity-30">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="startDownload('mp3')" class="py-4 rounded-2xl bg-purple-600 hover:bg-purple-500 font-bold tracking-widest uppercase text-xs transition-all active:scale-95">
                        <i class="fa-solid fa-music mr-2"></i> MP3 İndir
                    </button>
                    <button onclick="startDownload('mp4')" class="py-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 font-bold tracking-widest uppercase text-xs transition-all active:scale-95">
                        <i class="fa-solid fa-video mr-2"></i> MP4 İndir
                    </button>
                </div>

                <div id="progress-container" class="hidden space-y-4 pt-6 border-t border-white/5">
                    <div class="flex justify-between items-end mb-1">
                        <div>
                            <p id="status-text" class="text-xs font-bold uppercase tracking-widest text-purple-400">Hazırlanıyor...</p>
                            <p id="sub-status" class="text-[10px] opacity-40 uppercase">Sunucuya bağlanılıyor</p>
                        </div>
                        <span id="percent-text" class="text-2xl font-black">0%</span>
                    </div>
                    <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-purple-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function startDownload(type) {
            const url = document.getElementById('youtube-url').value;
            if(!url) return;

            const container = document.getElementById('progress-container');
            container.classList.remove('hidden');
            
            // Simüle edilmiş indirme süreci
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if(progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    updateStatus(100, 'Tamamlandı!', 'Dosyanız hazır.');
                } else if(progress > 70) {
                    updateStatus(progress, 'Dönüştürülüyor...', 'Kalite optimize ediliyor');
                } else {
                    updateStatus(progress, 'İndiriliyor...', 'Veri paketleri alınıyor');
                }
            }, 200);
        }

        function updateStatus(p, status, sub) {
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('percent-text').textContent = Math.round(p) + '%';
            document.getElementById('status-text').textContent = status;
            document.getElementById('sub-status').textContent = sub;
        }

        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({ length: 100 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2,
                v: Math.random() * 0.5
            }));
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(167,139,250,0.3)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
                s.y -= s.v; if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }

        window.onload = () => {
            initStars(); drawStars();
            setTimeout(() => {
                document.getElementById('global-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('global-loader').style.display = 'none', 600);
            }, 500);
        };
        window.onresize = initStars;
    </script>
</body>
</html>
