<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZESU AI - MIDI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/dist/magentamusic.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --z-purple: #a78bfa;
            --z-bg: #030014;
            --z-card: rgba(15, 12, 41, 0.8);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--z-bg);
            color: #ede9fe;
            margin: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.15) 0%, transparent 40%);
        }

        .glass-card {
            background: var(--z-card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 32px;
        }

        .action-btn {
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.2);
            transition: all 0.3s ease;
        }

        .action-btn:hover:not(:disabled) {
            background: var(--z-purple);
            color: #000;
            transform: translateY(-2px);
        }

        /* Navigasyon Sabitleme */
        .sidebar-fixed {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(167, 139, 250, 0.1);
            transition: all 0.3s ease;
            color: #ede9fe;
            text-decoration: none;
        }

        .sidebar-btn:hover {
            background: var(--z-purple);
            color: #000;
            transform: scale(1.1);
        }

        .sidebar-btn.active {
            background: var(--z-purple);
            color: #000;
            border-color: var(--z-purple);
        }

        #star-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .loader {
            position: fixed;
            inset: 0;
            background: var(--z-bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }

        /* Gizli dosya girişi */
        #midi-upload { display: none; }
    </style>
</head>
<body class="overflow-x-hidden">
    <!-- Yükleme Ekranı -->
    <div id="global-loader" class="loader">
        <div class="w-12 h-12 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
    </div>

    <canvas id="star-canvas"></canvas>

    <!-- Sabit Yan Menü -->
    <aside class="sidebar-fixed">
        <a href="index.html" class="sidebar-btn" title="Ana Sayfa">
            <i class="fa-solid fa-house"></i>
        </a>
        <a href="midi.html" class="sidebar-btn active" title="MIDI Studio">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </a>
        <a href="portfolio.html" class="sidebar-btn" title="Portfolyo">
            <i class="fa-solid fa-compact-disc"></i>
        </a>
        <a href="youtube.html" class="sidebar-btn" title="Downloader">
            <i class="fa-brands fa-youtube"></i>
        </a>
    </aside>

    <main class="min-h-screen flex flex-col items-center justify-center p-6 pl-24">
        <div class="glass-card max-w-4xl w-full p-8 md:p-12">
            <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                <div class="text-center md:text-left">
                    <h1 class="text-4xl font-black uppercase tracking-tighter mb-2">MIDI <span class="text-purple-400">STUDIO</span></h1>
                    <p class="text-xs opacity-40 uppercase tracking-[0.3em] font-bold">Magenta AI Destekli Melodi Üretici</p>
                </div>
                <div class="flex flex-wrap justify-center gap-3">
                    <button id="generate-btn" class="action-btn px-6 py-3 rounded-full font-bold uppercase tracking-widest text-[10px]">
                        AI Melodi Üret
                    </button>
                    <label for="midi-upload" class="action-btn px-6 py-3 rounded-full font-bold uppercase tracking-widest text-[10px] cursor-pointer">
                        Dosya Ekle
                    </label>
                    <input type="file" id="midi-upload" accept=".mid,.midi">
                    <button id="download-btn" disabled class="action-btn px-6 py-3 rounded-full font-bold uppercase tracking-widest text-[10px] opacity-30 cursor-not-allowed">
                        İndir
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                    <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-1">Dosya</p>
                    <p id="file-name-display" class="text-lg font-bold truncate">Yeni Melodi</p>
                </div>
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                    <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-1">Durum</p>
                    <p id="status" class="text-lg font-bold text-purple-400">Hazır</p>
                </div>
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                    <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-1">Tempo</p>
                    <p class="text-lg font-bold">120 BPM</p>
                </div>
            </div>

            <div id="visualizer" class="w-full h-48 bg-black/40 rounded-2xl border border-white/5 flex items-center justify-center relative overflow-hidden">
                <p id="viz-placeholder" class="text-xs opacity-20 uppercase tracking-[0.5em] font-bold">Melodi Görselleştirici</p>
                <div id="viz-bars" class="absolute inset-0 flex items-end justify-center gap-1 p-4"></div>
            </div>
        </div>
    </main>

    <script>
        // Magenta.js Yapılandırması
        const model = new mm.MusicRNN('https://storage.googleapis.com/magentadata/js/checkpoints/music_rnn/basic_rnn');
        let generatedSequence = null;

        const genBtn = document.getElementById('generate-btn');
        const dlBtn = document.getElementById('download-btn');
        const uploadInput = document.getElementById('midi-upload');
        const status = document.getElementById('status');
        const vizBars = document.getElementById('viz-bars');
        const vizPlaceholder = document.getElementById('viz-placeholder');
        const fileNameDisplay = document.getElementById('file-name-display');

        // AI Melodi Üretme
        async function generate() {
            try {
                genBtn.disabled = true;
                status.textContent = "Üretiliyor...";
                vizPlaceholder.style.display = 'none';
                
                if (!model.isInitialized()) await model.initialize();

                const seed = {
                    notes: [{ pitch: Math.floor(Math.random() * (72 - 60 + 1)) + 60, startTime: 0, endTime: 0.5 }],
                    totalTime: 0.5
                };

                generatedSequence = await model.continueSequence(seed, 32, 1.1);
                
                dlBtn.disabled = false;
                dlBtn.classList.remove('opacity-30', 'cursor-not-allowed');
                status.textContent = "Tamamlandı";
                fileNameDisplay.textContent = "AI_Generated.mid";
                
                visualize(generatedSequence.notes);
            } catch (e) {
                status.textContent = "Hata!";
                console.error(e);
            } finally {
                genBtn.disabled = false;
            }
        }

        // Dosya Yükleme Fonksiyonu
        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.textContent = "Yükleniyor...";
            fileNameDisplay.textContent = file.name;
            vizPlaceholder.style.display = 'none';

            try {
                const blob = new Blob([file]);
                generatedSequence = await mm.blobToNoteSequence(blob);
                visualize(generatedSequence.notes);
                status.textContent = "Dosya Hazır";
                dlBtn.disabled = false;
                dlBtn.classList.remove('opacity-30', 'cursor-not-allowed');
            } catch (err) {
                status.textContent = "Hatalı MIDI";
                console.error(err);
            }
        });

        function visualize(notes) {
            vizBars.innerHTML = '';
            notes.forEach(n => {
                const bar = document.createElement('div');
                bar.className = 'bg-purple-500/40 w-full rounded-t-sm transition-all duration-500';
                bar.style.height = `${(n.pitch - 40) * 2.5}%`;
                vizBars.appendChild(bar);
            });
        }

        genBtn.onclick = generate;

        dlBtn.onclick = () => {
            if (!generatedSequence) return;
            const midi = mm.sequenceProtoToMidi(generatedSequence);
            const blob = new Blob([midi], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileNameDisplay.textContent || 'zesu_melody.mid';
            a.click();
        };

        // Arka Plan Animasyonu
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({ length: 100 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2,
                v: Math.random() * 0.5
            }));
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(167,139,250,0.3)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
                s.y -= s.v; if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }

        window.onload = () => {
            initStars(); 
            drawStars();
            setTimeout(() => {
                const loader = document.getElementById('global-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 600);
                }
            }, 600);
        };
        window.onresize = initStars;
    </script>
</body>
</html>
