<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZESU AI - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --z-purple: #a78bfa;
            --z-bg: #030014;
            --z-card: rgba(15, 12, 41, 0.8);
            --z-accent: #c084fc;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--z-bg);
            color: #ede9fe;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(45, 10, 80, 0.15) 0%, transparent 40%);
        }

        #star-canvas { position: fixed; inset: 0; z-index: -1; }

        .gradient-text {
            background: linear-gradient(to right, var(--z-purple), #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            text-decoration: none;
        }

        .sidebar-icon {
            width: 52px;
            height: 52px;
            background: var(--z-card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(167, 139, 250, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            transition: all 0.4s ease;
        }

        .sidebar-link:hover .sidebar-icon, .sidebar-link.active .sidebar-icon {
            color: white;
            border-color: var(--z-purple);
            background: rgba(167, 139, 250, 0.2);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
        }

        /* SoundCloud Container */
        .sc-container {
            width: 100%;
            height: 450px;
            background: var(--z-card);
            border: 1px solid rgba(167, 139, 250, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #global-loader {
            position: fixed;
            inset: 0;
            background: #030014;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }

        .platform-link {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .platform-link:hover {
            background: var(--z-purple);
            transform: scale(1.1);
        }
    </style>
</head>

<body oncontextmenu="return false;">
    <canvas id="star-canvas"></canvas>

    <!-- Loader -->
    <div id="global-loader">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-t-4 border-purple-500 rounded-full animate-spin"></div>
            <h1 style="font-family: 'Syncopate';" class="mt-6 text-2xl font-bold tracking-[0.5em] text-purple-400">ZESU AI</h1>
        </div>
    </div>

    <!-- Logo Area -->
    <div class="fixed top-8 left-8 z-[100] flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-700 flex items-center justify-center">
            <i class="fas fa-microchip text-white text-xl"></i>
        </div>
        <div>
            <span class="text-2xl font-black tracking-tighter block leading-none">ZESU STUDIO</span>
            <span class="text-[9px] font-bold text-purple-400/60 uppercase tracking-[0.4em]">Audio Intelligence</span>
        </div>
    </div>

    <!-- Navigation -->
    <aside class="sidebar">
        <a href="index.html" class="sidebar-link"><div class="sidebar-icon"><i class="fas fa-home"></i></div></a>
        <a href="vocal-remover.html" class="sidebar-link"><div class="sidebar-icon"><i class="fas fa-microphone-lines"></i></div></a>
        <a href="midi.html" class="sidebar-link"><div class="sidebar-icon"><i class="fas fa-keyboard"></i></div></a>
        <a href="youtube.html" class="sidebar-link"><div class="sidebar-icon"><i class="fab fa-youtube"></i></div></a>
        <a href="portfolio.html" class="sidebar-link active"><div class="sidebar-icon"><i class="fas fa-briefcase"></i></div></a>
    </aside>

    <main class="max-w-4xl mx-auto px-6 h-screen flex flex-col justify-center py-12">
        <header class="text-center mb-10">
            <h1 class="text-5xl lg:text-7xl font-black uppercase tracking-[0.1em] mb-4">MY <span class="gradient-text">MUSIC</span></h1>
            <p class="text-xs opacity-40 uppercase tracking-[0.4em] font-medium">Auto-syncing from SoundCloud Profile</p>
        </header>

        <!-- AUTOMATIC SOUNDCLOUD PLAYER -->
        <div class="sc-container">
            <iframe 
                width="100%" 
                height="450" 
                scrolling="no" 
                frameborder="no" 
                allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/users/1188372679&color=%23a78bfa&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <section class="mt-12 text-center">
            <h2 class="text-xl font-black uppercase tracking-[0.3em] mb-6 opacity-60">Follow Me</h2>
            <div class="flex justify-center gap-6">
                <a href="https://soundcloud.com/zesudev" target="_blank" class="platform-link"><i class="fab fa-soundcloud"></i></a>
                <a href="https://discord.com/users/1107041038910103622" target="_blank" class="platform-link"><i class="fab fa-discord"></i></a>
            </div>
        </section>
    </main>

    <script>
