<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZESU AI - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --z-purple: #a78bfa;
            --z-bg: #030014;
            --z-card: rgba(15, 12, 41, 0.8);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--z-bg);
            color: #ede9fe;
            margin: 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.15) 0%, transparent 40%);
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, var(--z-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(167, 139, 250, 0.1);
            transition: all 0.3s ease;
        }

        .sidebar-btn:hover {
            background: var(--z-purple);
            color: #000;
            transform: translateX(5px);
        }

        .sc-container {
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(167, 139, 250, 0.2);
            box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.5);
        }

        #star-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body class="overflow-y-auto">
    <canvas id="star-canvas"></canvas>

    <aside class="fixed left-6 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-4">
        <a href="index.html" class="sidebar-btn" title="Ana Sayfa"><i class="fa-solid fa-house"></i></a>
        <a href="midi.html" class="sidebar-btn" title="MIDI Studio"><i class="fa-solid fa-music"></i></a>
        <a href="youtube.html" class="sidebar-btn" title="Downloader"><i class="fa-brands fa-youtube"></i></a>
    </aside>

    <main class="max-w-4xl mx-auto px-6 py-20 min-h-screen flex flex-col justify-center">
        <header class="text-center mb-10">
            <h1 class="text-5xl lg:text-7xl font-black uppercase tracking-[0.1em] mb-4">MY <span class="gradient-text">MUSIC</span></h1>
            <p class="text-xs opacity-40 uppercase tracking-[0.4em] font-medium">SoundCloud Profilinden Otomatik Senkronizasyon</p>
        </header>

        <div class="sc-container">
            <iframe 
                width="100%" 
                height="450" 
                scrolling="no" 
                frameborder="no" 
                allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/users/1188372679&color=%23a78bfa&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </div>

        <section class="mt-12 text-center">
            <h2 class="text-xl font-black uppercase tracking-[0.3em] mb-6 opacity-60 text-purple-400">Beni Takip Edin</h2>
            <div class="flex justify-center gap-6">
                <a href="https://soundcloud.com/zesudev" target="_blank" class="text-3xl opacity-40 hover:opacity-100 hover:text-orange-500 transition-all">
                    <i class="fa-brands fa-soundcloud"></i>
                </a>
                <a href="#" class="text-3xl opacity-40 hover:opacity-100 hover:text-pink-500 transition-all">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="#" class="text-3xl opacity-40 hover:opacity-100 hover:text-blue-400 transition-all">
                    <i class="fa-brands fa-twitter"></i>
                </a>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({ length: 80 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2,
                v: Math.random() * 0.5
            }));
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(167,139,250,0.3)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
                s.y -= s.v; if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }

        window.onload = () => { initStars(); drawStars(); };
        window.onresize = initStars;
    </script>
</body>
</html>
